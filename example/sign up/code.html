<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - Thuocare</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#0070eb",
                        "surface-variant": "#e2e2e7",
                        "surface-container-highest": "#e2e2e7",
                        "secondary-container": "#e0dfe4",
                        "on-surface-variant": "#414755",
                        "outline-variant": "#c1c6d7",
                        "inverse-primary": "#adc6ff",
                        "surface-dim": "#d9dade",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f9f9fe",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f3f8",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#adc6ff",
                        "tertiary": "#bc000a",
                        "secondary-fixed-dim": "#c6c6cb",
                        "secondary-fixed": "#e3e2e7",
                        "on-secondary-container": "#626267",
                        "tertiary-container": "#e2241f",
                        "surface-tint": "#005bc1",
                        "on-primary-fixed": "#001a41",
                        "tertiary-fixed-dim": "#ffb4aa",
                        "background": "#f9f9fe",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e8e8ed",
                        "on-primary-fixed-variant": "#004493",
                        "error": "#ba1a1a",
                        "on-background": "#1a1c1f",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#d8e2ff",
                        "on-tertiary-fixed": "#410001",
                        "surface-bright": "#f9f9fe",
                        "outline": "#717786",
                        "on-primary-container": "#fefcff",
                        "secondary": "#5d5e63",
                        "primary": "#0058bc",
                        "tertiary-fixed": "#ffdad5",
                        "on-secondary-fixed-variant": "#46464b",
                        "on-tertiary-fixed-variant": "#930005",
                        "on-tertiary-container": "#fffbff",
                        "inverse-surface": "#2e3034",
                        "on-surface": "#1a1c1f",
                        "on-secondary-fixed": "#1a1b1f",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f0f0f5",
                        "surface-container": "#ededf2"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .blue-gradient-btn {
            background: linear-gradient(135deg, #0058BC 0%, #0070EB 100%);
        }
        .asymmetric-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">
<header class="w-full sticky top-0 z-50 bg-[#F9F9FE] px-6 py-6 flex items-center justify-between max-w-md mx-auto">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full surface-container-high text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="font-headline font-bold text-primary text-xl tracking-tight">Thuocare</div>
<div class="w-10"></div>
</header>
<main class="flex-1 w-full max-w-md px-8 pt-10 pb-32 flex flex-col">
<section class="mb-12">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-3">Create Account</h1>
<p class="text-on-surface-variant text-lg font-medium max-w-[280px] leading-relaxed">
                Begin your journey to a more <span class="text-primary">serene</span> health management experience.
            </p>
</section>
<form class="space-y-10">
<div class="space-y-6">
<div class="relative group">
<label class="block font-headline text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Full Name</label>
<input class="w-full h-16 px-6 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="Johnathan Doe" type="text"/>
</div>
<div class="relative group">
<label class="block font-headline text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Email Address</label>
<input class="w-full h-16 px-6 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="name@example.com" type="email"/>
</div>
<div class="relative group">
<label class="block font-headline text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Secure Password</label>
<div class="relative">
<input class="w-full h-16 px-6 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-start gap-4 p-5 rounded-3xl bg-surface-container-low/50 border border-white/40">
<div class="mt-1">
<span class="material-symbols-outlined text-primary" data-icon="verified_user">verified_user</span>
</div>
<p class="text-sm text-on-surface-variant leading-relaxed">
                    Your data is encrypted with clinical-grade security. We never share your records with third parties.
                </p>
</div>
</form>
<div class="mt-auto pt-10">
<div class="text-center mb-6">
<p class="text-sm text-on-surface-variant">
                    Already have an account? <a class="text-primary font-semibold" href="#">Sign In</a>
</p>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto p-8 bg-surface/80 backdrop-blur-xl z-50">
<button class="w-full h-16 blue-gradient-btn text-white font-headline font-bold text-lg rounded-full shadow-[0_8px_32px_rgba(0,88,188,0.25)] flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
<span>Get Started</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="h-4"></div>
</div>
<div class="fixed -z-10 top-0 right-0 w-64 h-64 bg-primary/5 asymmetric-shape blur-3xl pointer-events-none"></div>
<div class="fixed -z-10 bottom-40 -left-20 w-80 h-80 bg-primary/5 asymmetric-shape blur-3xl pointer-events-none"></div>
</body></html>
