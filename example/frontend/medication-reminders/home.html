<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medication Reminders - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
          colors: {
            brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" },
            med: {
              blueBg: "#f0f4ff", blueIcon: "#7c8ff2", blueText: "#5268de",
              greenBg: "#f0fbf0", greenIcon: "#7ad589", greenText: "#4caf50",
              orangeBg: "#fff9f0", orangeIcon: "#fca877", orangeText: "#e88046",
            }
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-stone-100 font-sans text-stone-900 antialiased flex justify-center">
  <!-- Mobile Frame -->
  <main class="relative w-full max-w-[400px] bg-white shadow-2xl overflow-y-auto pb-28 min-h-screen">
    
    <!-- Top Bar -->
    <header class="flex items-center justify-between px-6 pt-12 pb-4">
      <div class="h-10 w-10 overflow-hidden rounded-full border-2 border-brand/20">
        <img src="https://i.pravatar.cc/150?img=47" alt="User avatar" class="h-full w-full object-cover" />
      </div>
      <button class="flex h-10 w-10 items-center justify-center rounded-2xl bg-stone-100 text-stone-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
      </button>
    </header>

    <!-- Date Strip area -->
    <div class="px-6 mb-6">
      <h2 class="text-stone-400 font-medium text-sm mb-1">January 3</h2>
      <h1 class="text-2xl font-bold mb-4">Today reminders</h1>
      
      <!-- Calendar Strip -->
      <div class="flex justify-between items-center text-center">
        <div class="flex flex-col items-center gap-2">
          <span class="text-xs font-semibold text-stone-400">Sun</span>
          <span class="text-sm font-semibold text-stone-600">1</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <span class="text-xs font-semibold text-stone-400">Mon</span>
          <span class="text-sm font-semibold text-stone-600">2</span>
        </div>
        <!-- Active -->
        <div class="flex flex-col items-center gap-1">
          <span class="text-xs font-semibold text-brand">Tue</span>
          <div class="w-8 h-8 rounded-full bg-brand text-white flex items-center justify-center font-semibold text-sm shadow-md">
            3
          </div>
        </div>
        <div class="flex flex-col items-center gap-2">
          <span class="text-xs font-semibold text-stone-400">Wed</span>
          <span class="text-sm font-semibold text-stone-600">4</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <span class="text-xs font-semibold text-stone-400">Thu</span>
          <span class="text-sm font-semibold text-stone-600">5</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <span class="text-xs font-semibold text-stone-400">Fri</span>
          <span class="text-sm font-semibold text-stone-600">6</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <span class="text-xs font-semibold text-stone-400">Sat</span>
          <span class="text-sm font-semibold text-stone-600">7</span>
        </div>
      </div>
    </div>

    <!-- Filter -->
    <div class="flex justify-between px-6 mb-4 mt-8">
      <span class="text-xs font-semibold text-stone-400">Time</span>
      <div class="flex items-center justify-between w-[70%]">
        <span class="text-xs font-semibold text-stone-400">Medication</span>
        <div class="flex items-center gap-1 text-xs font-semibold text-stone-900 bg-stone-100 rounded-lg px-2 py-1">
          all
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>
    </div>

    <!-- Timeline List -->
    <div class="px-6 flex">
      <!-- Timeline Axis -->
      <div class="flex flex-col w-[30%] gap-16 relative pt-4">
        <!-- Line background -->
        <div class="absolute left-[80%] top-6 bottom-0 w-px bg-stone-200"></div>

        <div class="flex items-start justify-between relative pr-4">
          <div class="text-right leading-none relative -top-1">
            <span class="block font-bold text-sm">7:00</span>
            <span class="block text-[10px] text-stone-400 font-semibold mt-0.5">AM</span>
          </div>
          <!-- Line dot -->
          <div class="w-1.5 h-1.5 rounded-full bg-stone-300 absolute -right-[3px] top-1"></div>
        </div>

        <div class="flex items-start justify-between relative pr-4 mt-6">
          <div class="text-right leading-none relative -top-1">
            <span class="block font-bold text-sm">12:00</span>
            <span class="block text-[10px] text-stone-400 font-semibold mt-0.5">PM</span>
          </div>
          <div class="w-1.5 h-1.5 rounded-full bg-stone-300 absolute -right-[3px] top-1"></div>
        </div>

        <div class="flex items-start justify-between relative pr-4 mt-1">
          <div class="text-right leading-none relative -top-1">
            <span class="block font-bold text-sm">6:00</span>
            <span class="block text-[10px] text-stone-400 font-semibold mt-0.5">PM</span>
          </div>
          <div class="w-1.5 h-1.5 rounded-full bg-stone-300 absolute -right-[3px] top-1"></div>
        </div>
      </div>

      <!-- Schedule Cards -->
      <div class="flex flex-col w-[70%] pl-4 gap-4 pb-12 z-10">
        <!-- Event 1 -->
        <div class="bg-med-blueBg rounded-[20px] p-4 flex items-center justify-between">
          <div>
            <h3 class="font-bold text-stone-900 text-sm">Garsil 35mg</h3>
            <p class="text-stone-500 text-xs mt-0.5">2 tablets</p>
          </div>
          <div class="bg-white rounded-full p-2 text-med-blueIcon shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
          </div>
        </div>
        
        <!-- Event 2 (tied to 7AM block, somewhat abstract mapping in static HTML) -->
        <a href="medication.html" class="bg-med-greenBg rounded-[20px] p-4 flex items-center justify-between shadow-sm cursor-pointer group">
          <div>
            <h3 class="font-bold text-stone-900 text-sm group-hover:text-med-greenText transition-colors">Roaccutane 30mg</h3>
            <p class="text-stone-500 text-xs mt-0.5">1 capsule</p>
          </div>
          <div class="bg-white rounded-full p-2 text-med-greenIcon shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
          </div>
        </a>

        <!-- Event 3 -->
        <div class="bg-med-orangeBg rounded-[20px] p-4 flex items-center justify-between mt-6">
          <div>
            <h3 class="font-bold text-stone-900 text-sm">CardioActive 20ml</h3>
            <p class="text-stone-500 text-xs mt-0.5">20 drops</p>
          </div>
          <div class="bg-white rounded-full p-2 text-med-orangeIcon shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 2c-1.716 3.08-4.5 5.253-4.5 9a4.5 4.5 0 009 0c0-3.747-2.784-5.92-4.5-9z" clip-rule="evenodd" />
            </svg>
          </div>
        </div>

        <!-- Event 4 -->
        <div class="bg-med-blueBg rounded-[20px] p-4 flex items-center justify-between mt-8">
          <div>
            <h3 class="font-bold text-stone-900 text-sm">Garsil 35mg</h3>
            <p class="text-stone-500 text-xs mt-0.5">2 tablets</p>
          </div>
          <div class="bg-white rounded-full p-2 text-med-blueIcon shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Floating Bottom Navigation -->
    <div class="absolute bottom-6 left-6 right-6">
      <div class="bg-brand rounded-[2rem] p-2 flex justify-between items-center shadow-lg">
        <!-- Active Tab -->
        <div class="bg-brand-hover rounded-full px-5 py-3 flex items-center gap-2 text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd" />
          </svg>
          <span class="text-sm font-semibold">Today</span>
        </div>
        <!-- Inactive Tabs -->
        <button class="px-4 py-2 text-white/70 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </button>
        <button class="px-4 py-2 text-white/70 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
          </svg>
        </button>
        <button class="px-4 py-2 text-white/70 hover:text-white pr-5 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </button>
      </div>
    </div>

  </main>
</body>
</html>
