<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thuocare - Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center">
  <main class="w-full max-w-[400px] bg-white shadow-2xl min-h-screen flex flex-col pt-16 px-6 relative">
    <div class="mb-10">
      <div class="h-12 w-12 rounded-2xl bg-brand/10 text-brand flex items-center justify-center mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold mb-2">Welcome back</h1>
      <p class="text-sm text-stone-500">Sign in to manage your medication routine.</p>
    </div>

    <form action="auth-success.html" method="GET" class="flex flex-col gap-5 flex-1">
      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Phone number</label>
        <input type="tel" placeholder="090 123 4567" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all text-sm" required />
      </div>

      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Password</label>
        <div class="relative">
          <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all text-sm" required />
          <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="flex justify-between items-center mt-2">
        <a href="#" class="text-sm font-medium text-stone-500 hover:text-stone-700 transition-colors">Use email instead</a>
        <a href="forgot-password.html" class="text-sm font-medium text-brand hover:underline">Forgot password?</a>
      </div>

      <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-white font-semibold py-4 rounded-full mt-6 transition-colors shadow-md">
        Sign in
      </button>
    </form>

    <div class="pb-10 pt-6 text-center">
      <p class="text-sm text-stone-500">Don't have an account? <a href="sign-up.html" class="text-brand font-semibold hover:underline">Sign up</a></p>
    </div>
  </main>
</body>
</html>
