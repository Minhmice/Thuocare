<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thuocare - Onboarding</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center overflow-hidden">
  <main class="w-full max-w-[400px] bg-white shadow-2xl min-h-screen flex flex-col pt-12 relative overflow-hidden">
    
    <!-- Progress Bar -->
    <div class="px-6 mb-8 flex items-center justify-between">
      <button onclick="prevStep()" class="h-10 w-10 flex items-center justify-center -ml-2 text-stone-600 active:bg-stone-100 rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <div class="flex-1 px-4 flex gap-1">
        <div class="h-1 flex-1 bg-brand rounded-full transition-all" id="prog-1"></div>
        <div class="h-1 flex-1 bg-stone-200 rounded-full transition-all" id="prog-2"></div>
      </div>
      <div class="w-10"></div> <!-- spacing -->
    </div>

    <!-- Slides Container -->
    <div class="flex-1 relative flex transition-transform duration-500 ease-in-out" id="slider" style="width: 200%; transform: translateX(0%);">
      
      <!-- Step 1: Who -->
      <section class="w-1/2 flex-shrink-0 flex flex-col px-6 h-full">
        <div class="mb-8">
          <span class="text-brand font-semibold text-xs uppercase tracking-wider">Step 1 of 2</span>
          <h1 class="text-2xl font-bold mt-2">Who are you managing medication for right now?</h1>
        </div>
        <div class="flex flex-col gap-3">
          <label class="p-4 border-2 border-brand bg-brand/5 rounded-2xl flex items-center justify-between cursor-pointer transition-all">
            <span class="font-medium text-stone-900">Just myself</span>
            <input type="radio" name="who" checked class="w-5 h-5 text-brand focus:ring-brand border-stone-300" />
          </label>
          <label class="p-4 border-2 border-stone-200 hover:border-brand/50 rounded-2xl flex items-center justify-between cursor-pointer transition-all">
            <span class="font-medium text-stone-900">Mostly myself, with help</span>
            <input type="radio" name="who" class="w-5 h-5 text-brand focus:ring-brand border-stone-300" />
          </label>
        </div>
        <div class="mt-auto mb-10">
          <button onclick="nextStep()" class="w-full bg-brand hover:bg-brand-hover text-white font-semibold py-4 rounded-full transition-colors shadow-md">
            Continue
          </button>
        </div>
      </section>

      <!-- Step 2: How Often -->
      <section class="w-1/2 flex-shrink-0 flex flex-col px-6 h-full">
        <div class="mb-8">
          <span class="text-brand font-semibold text-xs uppercase tracking-wider">Step 2 of 2</span>
          <h1 class="text-2xl font-bold mt-2">How often do you usually need to take medicine?</h1>
        </div>
        <div class="flex flex-col gap-3">
          <label class="p-4 border-2 border-stone-200 hover:border-brand/50 rounded-2xl flex items-center justify-between cursor-pointer transition-all">
            <span class="font-medium text-stone-900">Once a day</span>
            <input type="radio" name="often" class="w-5 h-5 text-brand focus:ring-brand border-stone-300" />
          </label>
          <label class="p-4 border-2 border-brand bg-brand/5 rounded-2xl flex items-center justify-between cursor-pointer transition-all">
            <span class="font-medium text-stone-900">Two times a day</span>
            <input type="radio" name="often" checked class="w-5 h-5 text-brand focus:ring-brand border-stone-300" />
          </label>
          <label class="p-4 border-2 border-stone-200 hover:border-brand/50 rounded-2xl flex items-center justify-between cursor-pointer transition-all">
            <span class="font-medium text-stone-900">Only when needed</span>
            <input type="radio" name="often" class="w-5 h-5 text-brand focus:ring-brand border-stone-300" />
          </label>
        </div>
        <div class="mt-auto mb-10">
          <a href="home.html" class="block text-center w-full bg-brand hover:bg-brand-hover text-white font-semibold py-4 rounded-full transition-colors shadow-md">
            Finish setup
          </a>
        </div>
      </section>

    </div>

    <script>
      let currentStep = 0;
      function nextStep() {
        if (currentStep < 1) {
          currentStep++;
          updateSlider();
        }
      }
      function prevStep() {
        if (currentStep > 0) {
          currentStep--;
          updateSlider();
        } else {
          window.location.href = "home.html"; // Optional exit
        }
      }
      function updateSlider() {
        document.getElementById('slider').style.transform = `translateX(-${currentStep * 50}%)`;
        if (currentStep === 1) {
          document.getElementById('prog-2').classList.replace('bg-stone-200', 'bg-brand');
        } else {
          document.getElementById('prog-2').classList.replace('bg-brand', 'bg-stone-200');
        }
      }
    </script>
  </main>
</body>
</html>
