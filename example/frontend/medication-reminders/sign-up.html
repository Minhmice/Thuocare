<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thuocare - Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center">
  <main class="w-full max-w-[400px] bg-white shadow-2xl min-h-screen flex flex-col pt-12 px-6 overflow-y-auto pb-10">
    <div class="mb-8">
      <h1 class="text-2xl font-bold mb-2">Create an account</h1>
      <p class="text-sm text-stone-500">Let's set up your personal routine.</p>
    </div>

    <form action="auth-success.html" method="GET" class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Full name</label>
        <input type="text" placeholder="Nguyễn Văn A" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all text-sm" required />
      </div>

      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Phone number</label>
        <input type="tel" placeholder="090 123 4567" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all text-sm" required />
      </div>

      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Email <span class="text-stone-400 font-normal">(Optional)</span></label>
        <input type="email" placeholder="name@example.com" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all text-sm" />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1">Password</label>
          <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all text-sm" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1">Confirm</label>
          <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all text-sm" required />
        </div>
      </div>

      <div class="flex items-start gap-3 mt-4">
        <input type="checkbox" id="terms" class="mt-1 h-5 w-5 rounded border-stone-300 text-brand focus:ring-brand" required />
        <label for="terms" class="text-xs text-stone-500 leading-tight">
          I agree to the <a href="#" class="text-brand hover:underline">Terms of Service</a> and <a href="#" class="text-brand hover:underline">Privacy Policy</a>.
        </label>
      </div>

      <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-white font-semibold py-4 rounded-full mt-4 transition-colors shadow-md">
        Create account
      </button>
    </form>

    <div class="pt-8 text-center mt-auto">
      <p class="text-sm text-stone-500">Already have an account? <a href="sign-in.html" class="text-brand font-semibold hover:underline">Sign in</a></p>
    </div>
  </main>
</body>
</html>
