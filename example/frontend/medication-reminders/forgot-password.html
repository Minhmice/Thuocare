<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thuocare - Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center items-center">
  <!-- Simulating a modal overlay -->
  <div class="w-full max-w-[400px] bg-black/40 min-h-screen flex items-end sm:items-center sm:p-6 pb-0">
    <!-- Modal content -->
    <main class="w-full bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl p-6 relative animate-[slideUp_0.3s_ease-out]">
      <style>
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      </style>
      
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">Recover access</h2>
        <a href="sign-in.html" class="h-8 w-8 bg-stone-100 rounded-full flex items-center justify-center text-stone-500 hover:bg-stone-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </a>
      </div>

      <p class="text-sm text-stone-500 mb-6">Enter your registered phone number or email, and we’ll send you instructions to recover your account.</p>

      <div class="mb-6">
        <label class="block text-sm font-medium text-stone-700 mb-1">Phone or Email</label>
        <input type="text" placeholder="090 123 4567" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all text-sm" />
      </div>

      <!-- Simulated success state hidden by default, visible via JS for mock purposes -->
      <div id="successMessage" class="hidden mb-6 p-4 rounded-xl bg-green-50 text-green-700 text-sm flex gap-3 items-start border border-green-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>We sent recovery instructions to your phone.</span>
      </div>

      <button onclick="document.getElementById('successMessage').classList.remove('hidden'); this.innerText='Resend'" class="w-full bg-brand hover:bg-brand-hover text-white font-semibold py-4 rounded-full transition-colors shadow-md">
        Send instructions
      </button>
      
      <div class="mt-4 text-center pb-4">
        <a href="sign-in.html" class="text-sm font-semibold text-stone-500 hover:text-stone-700">Back to sign in</a>
      </div>
    </main>
  </div>
</body>
</html>
