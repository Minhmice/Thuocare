<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thuocare - Meds List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" }, med: { blueBg: "#f0f4ff", blueIcon: "#7c8ff2", blueText: "#5268de", greenBg: "#f0fbf0", greenIcon: "#7ad589", greenText: "#4caf50", orangeBg: "#fff9f0", orangeIcon: "#fca877", orangeText: "#e88046" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center">
  <main class="w-full max-w-[400px] bg-white shadow-2xl min-h-screen flex flex-col relative pb-24">
    
    <!-- Top Bar -->
    <header class="flex items-center justify-between px-6 pt-12 pb-4">
      <h1 class="text-2xl font-bold">Medicines</h1>
      <a href="add-medication.html" class="flex items-center gap-1 text-sm font-semibold text-brand hover:bg-brand/10 px-3 py-1.5 rounded-full transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add
      </a>
    </header>

    <!-- Dashboard Summary -->
    <div class="px-6 mb-6 mt-2">
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-stone-50 rounded-2xl p-4 border border-stone-100 flex items-center justify-between shadow-sm">
          <div>
            <p class="text-xs text-stone-500 font-medium mb-1">Total Meds</p>
            <p class="text-xl font-bold">4</p>
          </div>
          <div class="h-8 w-8 bg-brand/10 text-brand rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
          </div>
        </div>
        <div class="bg-red-50 rounded-2xl p-4 border border-red-100 flex items-center justify-between shadow-sm">
          <div>
            <p class="text-xs text-red-500 font-medium mb-1">Low Stock</p>
            <p class="text-xl font-bold text-red-600">1</p>
          </div>
          <div class="h-8 w-8 bg-red-100 text-red-500 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Medication List -->
    <div class="px-6 flex flex-col gap-4 overflow-y-auto">
      
      <!-- Card 1 (Good Stock) -->
      <a href="medication.html" class="flex bg-white border border-stone-200 rounded-[20px] p-4 shadow-sm group hover:border-brand/40 transition-colors cursor-pointer">
        <div class="h-12 w-12 bg-med-blueBg text-med-blueIcon rounded-xl flex items-center justify-center mr-4 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </div>
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <h3 class="font-bold text-stone-900 group-hover:text-brand transition-colors">Garsil 35mg</h3>
            <span class="text-[10px] font-semibold bg-stone-100 text-stone-500 px-2 py-0.5 rounded-full">42 left</span>
          </div>
          <p class="text-stone-500 text-xs mt-0.5">2 tablets • Morning, Evening</p>
        </div>
      </a>

      <!-- Card 2 (Low Stock) -->
      <a href="medication.html" class="flex bg-white border border-red-200 rounded-[20px] p-4 shadow-sm group cursor-pointer relative overflow-hidden">
        <div class="absolute top-0 right-0 w-16 h-16 bg-red-50 rounded-bl-[40px] -z-10"></div>
        <div class="h-12 w-12 bg-med-greenBg text-med-greenIcon rounded-xl flex items-center justify-center mr-4 shrink-0">
           <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
        </div>
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <h3 class="font-bold text-stone-900 group-hover:text-brand transition-colors">Roaccutane 30mg</h3>
            <span class="text-[10px] font-semibold bg-red-100 text-red-600 px-2 py-0.5 rounded-full ring-1 ring-red-200">5 left</span>
          </div>
          <p class="text-stone-500 text-xs mt-0.5">1 capsule • Morning</p>
        </div>
      </a>

      <!-- Card 3 -->
      <a href="medication.html" class="flex bg-white border border-stone-200 rounded-[20px] p-4 shadow-sm group hover:border-brand/40 transition-colors cursor-pointer">
        <div class="h-12 w-12 bg-med-orangeBg text-med-orangeIcon rounded-xl flex items-center justify-center mr-4 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2c-1.716 3.08-4.5 5.253-4.5 9a4.5 4.5 0 009 0c0-3.747-2.784-5.92-4.5-9z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <h3 class="font-bold text-stone-900 group-hover:text-brand transition-colors">CardioActive 20ml</h3>
            <span class="text-[10px] font-semibold bg-stone-100 text-stone-500 px-2 py-0.5 rounded-full">1 bottle</span>
          </div>
          <p class="text-stone-500 text-xs mt-0.5">20 drops • Noon</p>
        </div>
      </a>

    </div>

    <!-- Floating Bottom Navigation -->
    <div class="fixed bottom-6 w-full max-w-[400px] px-6">
      <div class="bg-brand rounded-[2rem] p-2 flex justify-between items-center shadow-lg">
        <!-- Inactive Tab -->
        <a href="home.html" class="px-4 py-2 text-white/70 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </a>
        <a href="home.html" class="px-4 py-2 text-white/70 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </a>
        <!-- Active Tab (Meds) -->
        <div class="bg-brand-hover rounded-full px-5 py-3 flex items-center gap-2 text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
          </svg>
          <span class="text-sm font-semibold">Pills</span>
        </div>
        <!-- Profile Tab -->
        <a href="me.html" class="px-4 py-2 text-white/70 hover:text-white pr-5 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </a>
      </div>
    </div>

  </main>
</body>
</html>
