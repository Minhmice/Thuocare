<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thuocare - Add Medication</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center">
  <main class="w-full max-w-[400px] bg-white shadow-2xl min-h-screen flex flex-col relative pb-6">
    
    <!-- Top Bar -->
    <header class="flex items-center justify-between px-6 pt-12 pb-4">
      <a href="meds.html" class="flex h-10 w-10 items-center -ml-2 text-stone-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1 class="text-sm font-semibold">New Medication</h1>
      <div class="h-10 w-10"></div> <!-- spacing -->
    </header>

    <div class="px-6 flex-1 overflow-y-auto">
      
      <!-- Section 1: Identity -->
      <section class="mb-8">
        <h2 class="text-lg font-bold mb-4">Identity</h2>
        <div class="flex flex-col gap-4">
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Medication Name</label>
            <input type="text" placeholder="e.g. Paracetamol 500mg" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Dose form</label>
            <div class="flex gap-2">
              <label class="flex-1 text-center p-3 border-2 border-brand bg-brand/5 rounded-2xl cursor-pointer">
                <input type="radio" name="form" checked class="hidden" />
                <span class="text-sm font-medium text-brand">Tablet/Capsule</span>
              </label>
              <label class="flex-1 text-center p-3 border-2 border-stone-100 hover:border-brand/30 rounded-2xl cursor-pointer">
                <input type="radio" name="form" class="hidden" />
                <span class="text-sm font-medium text-stone-600">Liquid</span>
              </label>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">How many per dose?</label>
            <input type="number" placeholder="2 tablets" class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 focus:outline-none focus:ring-2 focus:ring-brand/50 text-sm" />
          </div>
        </div>
      </section>

      <hr class="border-stone-100 mb-8" />

      <!-- Section 2: Schedule -->
      <section class="mb-8">
        <h2 class="text-lg font-bold mb-4">Schedule</h2>
        <p class="text-xs text-stone-500 mb-4">Select when you need to take this medication.</p>
        
        <div class="flex flex-col gap-3">
          <label class="flex items-center justify-between p-4 rounded-2xl border border-stone-200 bg-white">
            <div class="flex items-center gap-3">
              <div class="h-8 w-8 bg-stone-100 text-stone-600 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
              </div>
              <span class="font-medium text-stone-900">Morning</span>
            </div>
            <input type="checkbox" checked class="w-5 h-5 text-brand rounded focus:ring-brand border-stone-300" />
          </label>

          <label class="flex items-center justify-between p-4 rounded-2xl border border-stone-200 bg-white">
            <div class="flex items-center gap-3">
              <div class="h-8 w-8 bg-stone-100 text-stone-600 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
              </div>
              <span class="font-medium text-stone-900">Noon</span>
            </div>
            <input type="checkbox" class="w-5 h-5 text-brand rounded focus:ring-brand border-stone-300" />
          </label>

          <label class="flex items-center justify-between p-4 rounded-2xl border border-stone-200 bg-white">
            <div class="flex items-center gap-3">
              <div class="h-8 w-8 bg-stone-100 text-stone-600 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
              </div>
              <span class="font-medium text-stone-900">Evening</span>
            </div>
            <input type="checkbox" checked class="w-5 h-5 text-brand rounded focus:ring-brand border-stone-300" />
          </label>
        </div>
      </section>

      <!-- Section 3: Optional Stock -->
      <section class="mb-4">
        <h2 class="text-sm font-bold text-stone-500 uppercase tracking-wider mb-4">Stock</h2>
        <div class="flex justify-between items-center py-2">
          <span class="text-sm font-medium">Current quantity</span>
          <input type="number" placeholder="Optional" class="w-24 px-3 py-2 text-right rounded-xl bg-stone-50 border border-stone-200 text-sm" />
        </div>
      </section>

    </div>

    <div class="px-6 mt-4">
      <a href="meds.html" class="block text-center w-full bg-brand hover:bg-brand-hover text-white font-semibold py-4 rounded-full transition-colors shadow-md">
        Save Medication
      </a>
    </div>

  </main>
</body>
</html>
