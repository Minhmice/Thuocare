<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thuocare - Me (Profile)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center">
  <main class="w-full max-w-[400px] bg-white shadow-2xl min-h-screen flex flex-col relative pb-24">
    
    <!-- Top Bar -->
    <header class="flex items-center justify-between px-6 pt-12 pb-4">
      <h1 class="text-2xl font-bold">Account</h1>
    </header>

    <div class="px-6 flex-1 overflow-y-auto">
      
      <!-- Profile Summary -->
      <section class="flex flex-col items-center py-6">
        <div class="h-24 w-24 rounded-full bg-stone-100 border-4 border-brand/10 flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <h2 class="text-xl font-bold text-stone-900">Nguyễn Văn A</h2>
        <p class="text-sm text-stone-500 mt-1">090 123 4567</p>
      </section>

      <!-- Settings Block -->
      <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mt-6 mb-3">Settings</h3>
      <div class="bg-stone-50 rounded-[20px] p-2 border border-stone-100 flex flex-col">
        
        <div class="flex items-center justify-between p-3 rounded-2xl hover:bg-stone-100 transition-colors cursor-pointer">
          <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-full bg-blue-100 text-blue-500 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />

            </div>
            <span class="text-sm font-medium">Push Notifications</span>
          </div>
          <div class="w-10 h-6 bg-brand rounded-full relative">
            <div class="w-5 h-5 bg-white rounded-full absolute top-0.5 right-0.5 shadow-sm"></div>
          </div>
        </div>

        <div class="flex items-center justify-between p-3 rounded-2xl hover:bg-stone-100 transition-colors cursor-pointer mt-1">
          <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-full bg-purple-100 text-purple-500 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
            </div>
            <span class="text-sm font-medium">Reminder Intensity</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-stone-500 font-medium">Balanced</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </div>

      </div>

      <!-- Support Block -->
      <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mt-8 mb-3">Help</h3>
      <div class="bg-stone-50 rounded-[20px] p-2 border border-stone-100 flex flex-col">
        <a href="#" class="flex items-center justify-between p-3 rounded-2xl hover:bg-stone-100 transition-colors cursor-pointer">
          <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-full bg-stone-200 text-stone-600 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <span class="text-sm font-medium">FAQ & Support</span>
          </div>
        </a>

      <!-- Sign out -->
      <div class="mt-10 flex justify-center">
        <a href="sign-in.html" class="flex items-center gap-2 text-red-500 font-semibold px-4 py-2 rounded-full hover:bg-red-50 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Sign out
        </a>
      </div>

    </div>

    <!-- Floating Bottom Navigation -->
    <div class="fixed bottom-6 w-full max-w-[400px] px-6">
      <div class="bg-brand rounded-[2rem] p-2 flex justify-between items-center shadow-lg">
        <!-- Inactive Tabs -->
        <a href="home.html" class="px-4 py-2 text-white/70 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </a>
        <a href="home.html" class="px-4 py-2 text-white/70 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
             <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </a>
        <a href="meds.html" class="px-4 py-2 text-white/70 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">

          </svg>
        </a>
        <!-- Active Tab (Profile) -->
        <div class="bg-brand-hover rounded-full px-5 py-3 flex items-center gap-2 text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
