<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3;url=onboarding-survey.html" />
  <title>Thuocare - Success</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6" } } } } };
  </script>
  <style>
    @keyframes settle {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-settle { animation: settle 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  </style>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center">
  <main class="w-full max-w-[400px] bg-white shadow-2xl min-h-screen flex flex-col items-center justify-center p-8 text-center">
    
    <div class="animate-settle w-20 h-20 rounded-full bg-brand text-white flex items-center justify-center mb-6 shadow-xl shadow-brand/20">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    
    <div class="animate-settle" style="animation-delay: 100ms; opacity: 0;">
      <h1 class="text-2xl font-bold mb-2 text-stone-900">You're in.</h1>
      <p class="text-stone-500">Let's set up your routine...</p>
      
      <!-- Loading indicator -->
      <div class="mt-12 flex justify-center gap-2">
        <div class="w-2 h-2 rounded-full bg-brand/30 animate-bounce" style="animation-delay: 0s"></div>
        <div class="w-2 h-2 rounded-full bg-brand/60 animate-bounce" style="animation-delay: 0.2s"></div>
        <div class="w-2 h-2 rounded-full bg-brand animate-bounce" style="animation-delay: 0.4s"></div>
      </div>
    </div>

  </main>
</body>
</html>
