<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Me — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 font-sans">
  <div class="mx-auto max-w-md bg-white pb-24 shadow-xl min-h-screen">
    <header class="px-5 pt-8">
      <h1 class="text-2xl font-bold">Tài khoản</h1>
    </header>

    <div class="mx-5 mt-6 rounded-3xl bg-stone-50 p-5">
      <div class="flex items-center gap-4">
        <div class="flex h-14 w-14 items-center justify-center rounded-full bg-brand/10 text-lg font-bold text-brand">?</div>
        <div>
          <p id="name" class="font-semibold text-stone-400">Đang tải…</p>
          <p id="phone" class="text-sm text-stone-400">—</p>
        </div>
      </div>
      <p class="mt-3 text-xs text-stone-400">getProfile → null (mock)</p>
    </div>

    <section class="mt-8 px-5">
      <h2 class="text-xs font-bold uppercase tracking-wider text-stone-400">Nhắc nhở</h2>
      <div class="mt-3 divide-y divide-stone-100 rounded-2xl border border-stone-100">
        <button type="button" class="flex w-full items-center justify-between py-4 text-left text-sm font-medium">Cường độ nhắc <span class="text-stone-400">—</span></button>
        <button type="button" class="flex w-full items-center justify-between py-4 text-left text-sm font-medium">Thông báo <span class="text-stone-400">Tắt/Bật</span></button>
      </div>
    </section>

    <section class="mt-6 px-5">
      <a href="#" class="block rounded-2xl py-4 text-sm font-medium text-stone-700 hover:bg-stone-50">Trợ giúp</a>
    </section>

    <div class="mt-10 px-5">
      <button type="button" id="out" class="w-full rounded-2xl border border-red-100 py-4 text-sm font-semibold text-red-600 hover:bg-red-50">Đăng xuất</button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-center border-t border-stone-100 bg-white">
      <div class="flex w-full max-w-md justify-around py-3 text-xs font-semibold">
        <a href="home.html" class="text-stone-400 hover:text-stone-700">Home</a>
        <a href="meds.html" class="text-stone-400 hover:text-stone-700">Meds</a>
        <a href="me.html" class="text-brand">Me</a>
      </div>
    </nav>
  </div>
  <script src="../mock-backend.js"></script>
  <script>
    MockBackend.getProfile("mock").then(function (r) {
      document.getElementById("name").textContent = r.data ? "User" : "Chưa có dữ liệu";
      document.getElementById("phone").textContent = r.data ? "" : "SĐT —";
    });
    document.getElementById("out").addEventListener("click", function () {
      MockBackend.signOut().then(function () {
        window.location.href = "welcome.html";
      });
    });
  </script>
</body>
</html>
