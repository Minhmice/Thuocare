<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 font-sans">
  <main class="mx-auto min-h-screen max-w-md bg-white shadow-xl">
    <header class="flex items-center gap-4 border-b border-stone-100 px-5 py-4">
      <a href="home.html" class="text-stone-500">←</a>
      <h1 class="text-lg font-bold">Thông báo</h1>
    </header>
    <div id="box" class="p-5"></div>
  </main>
  <script src="../mock-backend.js"></script>
  <script>
    MockBackend.listNotifications("mock").then(function (r) {
      var box = document.getElementById("box");
      if (!r.data.length) {
        box.innerHTML = '<p class="rounded-2xl bg-stone-50 px-4 py-12 text-center text-sm text-stone-500">Không có thông báo — <code class="text-xs">listNotifications → []</code></p>';
      }
    });
    MockBackend.getNotificationPreferences("mock").then(function (r) {
      console.log("notif prefs:", r.data);
    });
  </script>
</body>
</html>
