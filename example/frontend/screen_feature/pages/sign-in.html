<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center font-sans">
  <main class="relative flex min-h-screen w-full max-w-[400px] flex-col bg-white px-6 pb-10 pt-16 shadow-2xl">
    <a href="index.html" class="absolute left-4 top-4 text-sm text-stone-400 hover:text-stone-600">← Hub</a>
    <div class="mb-8">
      <div class="mb-6 flex h-12 w-12 items-center justify-center rounded-2xl bg-brand/10 text-brand">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
      </div>
      <h1 class="text-2xl font-bold">Welcome back</h1>
      <p class="mt-1 text-sm text-stone-500">Đăng nhập để tiếp tục lịch thuốc.</p>
    </div>

    <form id="form-signin" class="flex flex-1 flex-col gap-5">
      <div>
        <label class="mb-1 block text-sm font-medium text-stone-700">Số điện thoại</label>
        <input name="phone" type="tel" placeholder="090 123 4567" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm transition-all focus:outline-none focus:ring-2 focus:ring-brand/40" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-stone-700">Mật khẩu</label>
        <input name="password" type="password" placeholder="••••••••" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/40" />
      </div>
      <p id="err" class="hidden text-sm font-medium text-red-600" role="alert">Sai mật khẩu (mock UI).</p>
      <div class="mt-2 flex items-center justify-between">
        <button type="button" class="text-sm font-medium text-stone-500 hover:text-stone-700">Dùng email</button>
        <a href="forgot-password.html" class="text-sm font-medium text-brand hover:underline">Quên mật khẩu?</a>
      </div>
      <button type="submit" class="mt-4 w-full rounded-full bg-brand py-4 font-semibold text-white shadow-md transition-colors hover:bg-brand-hover">Đăng nhập</button>
      <button type="button" id="btn-wrong" class="text-xs text-stone-400 underline">Demo: hiện lỗi sai MK</button>
      <button type="button" id="btn-legal" class="text-xs text-stone-400 underline">Điều khoản (mock)</button>
    </form>

    <p class="pt-6 text-center text-sm text-stone-500">Chưa có tài khoản? <a href="sign-up.html" class="font-semibold text-brand hover:underline">Đăng ký</a></p>
  </main>
  <div id="legal-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 p-4" role="dialog" aria-modal="true">
    <div class="max-w-sm rounded-2xl bg-white p-6 shadow-xl">
      <p class="font-semibold">Điều khoản</p>
      <p class="mt-2 text-sm text-stone-500">Nội dung pháp lý deferred — placeholder theo spec.</p>
      <button type="button" id="legal-close" class="mt-4 w-full rounded-full bg-stone-100 py-3 text-sm font-semibold">Đóng</button>
    </div>
  </div>
  <script src="../mock-backend.js"></script>
  <script>
    document.getElementById("form-signin").addEventListener("submit", function (e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      MockBackend.signIn(fd.get("phone"), fd.get("password")).then(function () {
        window.location.href = "auth-success.html";
      });
    });
    document.getElementById("btn-wrong").addEventListener("click", function () {
      document.getElementById("err").classList.remove("hidden");
    });
    document.getElementById("btn-legal").addEventListener("click", function () {
      MockBackend.getLegalDocument("terms").then(function () {
        document.getElementById("legal-modal").classList.remove("hidden");
        document.getElementById("legal-modal").classList.add("flex");
      });
    });
    document.getElementById("legal-close").addEventListener("click", function () {
      var m = document.getElementById("legal-modal");
      m.classList.add("hidden");
      m.classList.remove("flex");
    });
  </script>
</body>
</html>
