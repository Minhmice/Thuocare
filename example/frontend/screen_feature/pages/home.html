<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: { brand: { DEFAULT: "#4a65f6" }, med: { blueBg: "#eef2ff", greenBg: "#f0fdf4" } }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-stone-100 font-sans text-stone-900">
  <div class="mx-auto flex min-h-screen max-w-md flex-col bg-white pb-24 shadow-xl">
    <header class="flex items-center justify-between px-5 pt-6">
      <div>
        <p class="text-lg font-bold">Chào bạn 👋</p>
        <p class="text-xs text-stone-500">Lịch hôm nay</p>
      </div>
      <div class="flex items-center gap-2">
        <a href="notifications.html" class="flex h-10 w-10 items-center justify-center rounded-full bg-stone-100 text-stone-600 hover:bg-stone-200" aria-label="Notifications">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
        </a>
        <div class="h-10 w-10 rounded-full bg-brand/15 text-center text-sm font-bold leading-10 text-brand">T</div>
      </div>
    </header>

    <div class="px-5 pt-4">
      <div class="mb-3 flex items-baseline justify-between">
        <h2 class="text-lg font-semibold">Tháng 3 2026</h2>
        <button type="button" class="text-sm font-semibold text-brand">Hôm nay</button>
      </div>
      <div class="flex gap-2 overflow-x-auto pb-2">
        <button type="button" class="min-w-[3.25rem] rounded-2xl bg-stone-100 px-3 py-2 text-center text-xs font-bold text-stone-500">T2<br /><span class="text-stone-900">24</span></button>
        <button type="button" class="min-w-[3.25rem] rounded-2xl bg-brand px-3 py-2 text-center text-xs font-bold text-white shadow-md">T3<br />25</button>
        <button type="button" class="min-w-[3.25rem] rounded-2xl bg-stone-100 px-3 py-2 text-center text-xs font-bold text-stone-500">T4<br />26</button>
      </div>
    </div>

    <section class="mt-4 flex-1 px-5" aria-live="polite">
      <h3 class="font-semibold">Cần uống</h3>
      <p class="text-sm text-stone-500">Buổi sáng</p>
      <div id="empty" class="mt-10 rounded-3xl border border-dashed border-stone-200 bg-stone-50 px-6 py-12 text-center">
        <p class="font-medium text-stone-700">Chưa có liều nào</p>
        <p class="mt-2 text-sm text-stone-500">API <code class="rounded bg-white px-1 text-xs">getScheduleForDate</code> trả mảng rỗng.</p>
        <a href="add-medication.html" class="mt-6 inline-block rounded-full bg-brand px-6 py-3 text-sm font-semibold text-white">Thêm thuốc</a>
      </div>
    </section>

    <a href="add-medication.html" class="fixed bottom-24 left-1/2 z-20 flex h-14 w-14 -translate-x-1/2 items-center justify-center rounded-full bg-brand text-white shadow-lg hover:bg-brand-hover" aria-label="Add">+</a>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-center border-t border-stone-100 bg-white">
      <div class="flex w-full max-w-md justify-around py-3 text-xs font-semibold">
        <a href="home.html" class="text-brand">Home</a>
        <a href="meds.html" class="text-stone-400 hover:text-stone-700">Meds</a>
        <a href="me.html" class="text-stone-400 hover:text-stone-700">Me</a>
      </div>
    </nav>
  </div>
  <script src="../mock-backend.js"></script>
  <script>
    MockBackend.getDailySummary(new Date().toISOString().slice(0, 10)).then(function (r) {
      console.log("dailySummary:", r.data);
    });
    MockBackend.getScheduleForDate(new Date().toISOString().slice(0, 10)).then(function (r) {
      console.log("schedule length:", r.data.length);
    });
  </script>
</body>
</html>
