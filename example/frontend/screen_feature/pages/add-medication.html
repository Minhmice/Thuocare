<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add medication — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 font-sans">
  <main class="mx-auto flex min-h-screen max-w-md flex-col bg-white shadow-xl">
    <header class="flex items-center justify-between border-b border-stone-100 px-4 py-4">
      <a href="meds.html" class="text-sm text-stone-500">Hủy</a>
      <span class="text-sm font-semibold">Thêm thuốc</span>
      <span class="w-8"></span>
    </header>
    <p class="px-5 pt-3 text-center text-xs font-semibold uppercase tracking-wider text-stone-400">Bước <span id="s">1</span>/5</p>
    <div class="h-1 bg-stone-100">
      <div id="bar" class="h-full bg-brand transition-all" style="width: 20%"></div>
    </div>

    <div id="p1" class="flex flex-1 flex-col gap-4 px-5 py-6">
      <h2 class="text-lg font-bold">Danh tính thuốc</h2>
      <input placeholder="Tên thuốc" class="rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
      <input placeholder="Dùng cho gì? (tuỳ chọn)" class="rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
      <label class="text-sm font-medium">Dạng</label>
      <select class="rounded-2xl border border-stone-200 px-4 py-3 text-sm">
        <option>Viên nén</option>
        <option>Viên nang</option>
        <option>Dung dịch</option>
      </select>
    </div>
    <div id="p2" class="hidden flex-1 flex-col gap-3 px-5 py-6">
      <h2 class="text-lg font-bold">Lịch trong ngày</h2>
      <p class="text-sm text-stone-500">Chọn buổi (spec: sáng / trưa / tối).</p>
      <label class="flex items-center gap-3 rounded-2xl border border-stone-100 bg-stone-50 px-4 py-3"><input type="checkbox" class="rounded" /> Sáng</label>
      <label class="flex items-center gap-3 rounded-2xl border border-stone-100 bg-stone-50 px-4 py-3"><input type="checkbox" class="rounded" /> Trưa</label>
      <label class="flex items-center gap-3 rounded-2xl border border-stone-100 bg-stone-50 px-4 py-3"><input type="checkbox" class="rounded" /> Tối</label>
      <button type="button" class="text-sm font-semibold text-brand">Dùng giờ cụ thể…</button>
    </div>
    <div id="p3" class="hidden flex-1 flex-col gap-4 px-5 py-6">
      <h2 class="text-lg font-bold">Tồn kho</h2>
      <p class="text-sm text-stone-500">Tuỳ chọn — có thể bỏ qua.</p>
      <input type="number" placeholder="Số viên còn lại" class="rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
    </div>
    <div id="p4" class="hidden flex-1 flex-col gap-4 px-5 py-6">
      <h2 class="text-lg font-bold">Thời gian điều trị</h2>
      <label class="text-xs font-semibold text-stone-500">Bắt đầu</label>
      <input type="date" class="rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
      <label class="text-xs font-semibold text-stone-500">Kết thúc (tuỳ chọn)</label>
      <input type="date" class="rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
    </div>
    <div id="p5" class="hidden flex-1 flex-col gap-4 px-5 py-6">
      <h2 class="text-lg font-bold">Xác nhận</h2>
      <p class="text-sm text-stone-500">Mock: không có dữ liệu preview — submit trả null.</p>
      <ul class="list-disc pl-5 text-sm text-stone-600">
        <li>Identity + schedule + stock + dates</li>
        <li>POST → submitAddMedication</li>
      </ul>
    </div>

    <footer class="border-t border-stone-100 p-5">
      <div class="flex gap-3">
        <button type="button" id="prev" class="flex-1 rounded-full border border-stone-200 py-3 text-sm font-semibold text-stone-600">Quay lại</button>
        <button type="button" id="go" class="flex-1 rounded-full bg-brand py-3 text-sm font-semibold text-white">Tiếp</button>
      </div>
    </footer>
  </main>
  <script src="../mock-backend.js"></script>
  <script>
    var step = 1;
    var payload = {};
    function show(n) {
      for (var i = 1; i <= 5; i++) {
        document.getElementById("p" + i).classList.toggle("hidden", i !== n);
      }
      document.getElementById("s").textContent = String(n);
      document.getElementById("bar").style.width = n * 20 + "%";
      document.getElementById("prev").disabled = n === 1;
      document.getElementById("prev").classList.toggle("opacity-40", n === 1);
      document.getElementById("go").textContent = n === 5 ? "Lưu" : "Tiếp";
    }
    document.getElementById("go").addEventListener("click", function () {
      MockBackend.saveAddMedicationDraft("mock", step, payload).then(function () {
        if (step < 5) {
          step++;
          show(step);
        } else {
          MockBackend.submitAddMedication("mock", payload).then(function () {
            window.location.href = "meds.html";
          });
        }
      });
    });
    document.getElementById("prev").addEventListener("click", function () {
      if (step > 1) {
        step--;
        show(step);
      }
    });
    show(1);
  </script>
</body>
</html>
