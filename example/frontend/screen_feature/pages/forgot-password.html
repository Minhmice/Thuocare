<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex items-center justify-center p-4 font-sans">
  <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-xl">
    <a href="sign-in.html" class="text-sm text-stone-400 hover:text-stone-600">← Sign in</a>
    <h1 class="mt-4 text-xl font-bold">Khôi phục tài khoản</h1>
    <p class="mt-2 text-sm text-stone-500">Nhập SĐT hoặc email — mock không gửi thật; API trả null.</p>
    <form id="f" class="mt-6 space-y-4">
      <input name="id" placeholder="SĐT hoặc email" class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/40" />
      <button type="submit" class="w-full rounded-full bg-brand py-3 font-semibold text-white hover:opacity-90">Gửi hướng dẫn</button>
    </form>
    <p id="msg" class="mt-4 text-sm text-stone-600"></p>
  </div>
  <script src="../mock-backend.js"></script>
  <script>
    document.getElementById("f").addEventListener("submit", function (e) {
      e.preventDefault();
      var v = new FormData(e.target).get("id");
      MockBackend.recoverAccount(v).then(function (r) {
        document.getElementById("msg").textContent = "Phản hồi mock: data = " + JSON.stringify(r.data);
      });
    });
  </script>
</body>
</html>
