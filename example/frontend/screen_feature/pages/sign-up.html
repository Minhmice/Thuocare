<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6", hover: "#3a52d6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 flex justify-center font-sans">
  <main class="flex min-h-screen w-full max-w-[400px] flex-col bg-white px-6 pb-10 pt-14 shadow-2xl">
    <a href="index.html" class="mb-6 text-sm text-stone-400 hover:text-stone-600">← Hub</a>
    <h1 class="text-2xl font-bold">Tạo tài khoản</h1>
    <p class="mt-1 text-sm text-stone-500">Đủ thông tin để bắt đầu — email là tùy chọn.</p>

    <form id="form-up" class="mt-8 flex flex-1 flex-col gap-4">
      <div>
        <label class="mb-1 block text-sm font-medium">Họ và tên</label>
        <input name="name" required class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/40" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium">Số điện thoại</label>
        <input name="phone" type="tel" required class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/40" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-stone-500">Email (tuỳ chọn)</label>
        <input name="email" type="email" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/40" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium">Mật khẩu</label>
        <input name="pw" type="password" required class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/40" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium">Nhập lại mật khẩu</label>
        <input name="pw2" type="password" required class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/40" />
      </div>
      <label class="mt-2 flex items-start gap-3 text-sm">
        <input id="legal" type="checkbox" class="mt-1 rounded border-stone-300" />
        <span>Tôi đồng ý với điều khoản (mock).</span>
      </label>
      <p id="err" class="hidden text-sm text-red-600"></p>
      <button type="submit" class="mt-4 w-full rounded-full bg-brand py-4 font-semibold text-white hover:bg-brand-hover">Đăng ký</button>
    </form>
    <p class="pt-6 text-center text-sm text-stone-500">Đã có tài khoản? <a href="sign-in.html" class="font-semibold text-brand hover:underline">Đăng nhập</a></p>
  </main>
  <script src="../mock-backend.js"></script>
  <script>
    document.getElementById("form-up").addEventListener("submit", function (e) {
      e.preventDefault();
      var err = document.getElementById("err");
      err.classList.add("hidden");
      if (!document.getElementById("legal").checked) {
        err.textContent = "Vui lòng tick đồng ý điều khoản.";
        err.classList.remove("hidden");
        return;
      }
      var fd = new FormData(e.target);
      if (fd.get("pw") !== fd.get("pw2")) {
        err.textContent = "Mật khẩu không khớp.";
        err.classList.remove("hidden");
        return;
      }
      MockBackend.signUp({
        fullName: fd.get("name"),
        phone: fd.get("phone"),
        email: fd.get("email") || null,
        password: fd.get("pw")
      }).then(function () {
        window.location.href = "auth-success.html";
      });
    });
  </script>
</body>
</html>
