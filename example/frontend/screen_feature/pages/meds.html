<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meds — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: { brand: { DEFAULT: "#4a65f6" }, med: { blueBg: "#eef2ff", blueIcon: "#818cf8" } }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-stone-100 font-sans">
  <div class="mx-auto flex min-h-screen max-w-md flex-col bg-white pb-20 shadow-xl">
    <header class="px-5 pt-8">
      <h1 class="text-2xl font-bold">Thuốc của tôi</h1>
      <p class="text-sm text-stone-500">Tổng quan — mock data rỗng</p>
    </header>

    <div class="mx-5 mt-6 grid grid-cols-3 gap-3 rounded-3xl bg-stone-50 p-4">
      <div class="text-center">
        <p id="c-total" class="text-2xl font-bold text-stone-300">—</p>
        <p class="text-[10px] font-semibold uppercase tracking-wide text-stone-400">Tổng</p>
      </div>
      <div class="text-center">
        <p id="c-today" class="text-2xl font-bold text-stone-300">—</p>
        <p class="text-[10px] font-semibold uppercase tracking-wide text-stone-400">Hôm nay</p>
      </div>
      <div class="text-center">
        <p id="c-low" class="text-2xl font-bold text-stone-300">—</p>
        <p class="text-[10px] font-semibold uppercase tracking-wide text-stone-400">Sắp hết</p>
      </div>
    </div>

    <div class="px-5 pt-6">
      <a href="add-medication.html" class="flex w-full items-center justify-center gap-2 rounded-full border-2 border-dashed border-brand/40 py-4 text-sm font-semibold text-brand hover:bg-brand/5">+ Thêm thuốc</a>
    </div>

    <div id="list" class="mt-6 flex flex-1 flex-col gap-3 px-5 pb-8"></div>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-center border-t border-stone-100 bg-white">
      <div class="flex w-full max-w-md justify-around py-3 text-xs font-semibold">
        <a href="home.html" class="text-stone-400 hover:text-stone-700">Home</a>
        <a href="meds.html" class="text-brand">Meds</a>
        <a href="me.html" class="text-stone-400 hover:text-stone-700">Me</a>
      </div>
    </nav>
  </div>
  <script src="../mock-backend.js"></script>
  <script>
    MockBackend.getMedsDashboardSummary("mock").then(function (r) {
      console.log("meds summary:", r.data);
    });
    MockBackend.getMedications("mock").then(function (r) {
      var el = document.getElementById("list");
      if (!r.data || r.data.length === 0) {
        el.innerHTML =
          '<div class="rounded-3xl border border-stone-100 bg-stone-50 px-5 py-10 text-center text-sm text-stone-500">Danh sách trống — <code class="text-xs">getMedications → []</code></div>';
      }
    });
  </script>
</body>
</html>
