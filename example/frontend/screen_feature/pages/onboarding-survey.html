<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding — Thuocare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] }, colors: { brand: { DEFAULT: "#4a65f6" } } } } };
  </script>
</head>
<body class="min-h-screen bg-stone-100 font-sans">
  <main class="mx-auto flex min-h-screen max-w-md flex-col bg-white shadow-xl">
    <header class="flex items-center justify-between border-b border-stone-100 px-5 py-4">
      <button type="button" id="back" class="text-sm text-stone-500 disabled:opacity-30" disabled>←</button>
      <span class="text-xs font-semibold uppercase tracking-wider text-stone-400"><span id="step-num">1</span>/2</span>
      <a href="index.html" class="text-sm text-stone-400">Hub</a>
    </header>
    <div class="h-1 bg-stone-100">
      <div id="bar" class="h-full bg-brand transition-all duration-300" style="width: 50%"></div>
    </div>

    <section id="step1" class="flex flex-1 flex-col px-6 py-8">
      <h1 class="text-xl font-bold">Bạn đang quản lý thuốc cho ai?</h1>
      <p class="mt-2 text-sm text-stone-500">Chọn một đáp án.</p>
      <div class="mt-8 flex flex-col gap-3">
        <button type="button" class="choice rounded-2xl border-2 border-stone-100 bg-stone-50 px-4 py-4 text-left font-medium transition-all hover:border-brand/30" data-q1="self">Chỉ cho bản thân tôi</button>
        <button type="button" class="choice rounded-2xl border-2 border-stone-100 bg-stone-50 px-4 py-4 text-left font-medium hover:border-brand/30" data-q1="self_help">Chủ yếu tôi, có người hỗ trợ</button>
      </div>
    </section>

    <section id="step2" class="hidden flex flex-1 flex-col px-6 py-8">
      <h1 class="text-xl font-bold">Bạn muốn nhắc nhở thế nào?</h1>
      <p class="mt-2 text-sm text-stone-500">Cường độ nhắc (Q5 spec).</p>
      <div class="mt-8 flex flex-col gap-3">
        <button type="button" class="choice2 rounded-2xl border-2 border-stone-100 bg-stone-50 px-4 py-4 text-left font-medium hover:border-brand/30" data-q5="gentle">Nhẹ nhàng</button>
        <button type="button" class="choice2 rounded-2xl border-2 border-stone-100 bg-stone-50 px-4 py-4 text-left font-medium hover:border-brand/30" data-q5="balanced">Cân bằng</button>
        <button type="button" class="choice2 rounded-2xl border-2 border-stone-100 bg-stone-50 px-4 py-4 text-left font-medium hover:border-brand/30" data-q5="firm">Rõ ràng / mạnh hơn</button>
      </div>
    </section>

    <footer class="border-t border-stone-100 p-5">
      <button type="button" id="next" class="w-full rounded-full bg-brand py-4 font-semibold text-white opacity-50" disabled>Tiếp tục</button>
    </footer>
  </main>
  <script src="../mock-backend.js"></script>
  <script>
    var step = 1;
    var answers = {};
    var back = document.getElementById("back");
    var next = document.getElementById("next");

    function setStep(n) {
      step = n;
      document.getElementById("step1").classList.toggle("hidden", n !== 1);
      document.getElementById("step2").classList.toggle("hidden", n !== 2);
      document.getElementById("step-num").textContent = String(n);
      document.getElementById("bar").style.width = n === 1 ? "50%" : "100%";
      back.disabled = n === 1;
      next.textContent = n === 2 ? "Hoàn tất" : "Tiếp tục";
      if (n === 1) {
        next.disabled = !answers.q1;
      } else {
        next.disabled = !answers.q5;
      }
      next.classList.toggle("opacity-50", next.disabled);
    }

    document.querySelectorAll(".choice").forEach(function (b) {
      b.addEventListener("click", function () {
        document.querySelectorAll(".choice").forEach(function (x) { x.classList.remove("border-brand", "bg-brand/5"); });
        b.classList.add("border-brand", "bg-brand/5");
        answers.q1 = b.getAttribute("data-q1");
        next.disabled = false;
        next.classList.remove("opacity-50");
      });
    });
    document.querySelectorAll(".choice2").forEach(function (b) {
      b.addEventListener("click", function () {
        document.querySelectorAll(".choice2").forEach(function (x) { x.classList.remove("border-brand", "bg-brand/5"); });
        b.classList.add("border-brand", "bg-brand/5");
        answers.q5 = b.getAttribute("data-q5");
        next.disabled = false;
        next.classList.remove("opacity-50");
      });
    });

    back.addEventListener("click", function () {
      if (step > 1) setStep(step - 1);
    });
    next.addEventListener("click", function () {
      if (step === 1) {
        setStep(2);
        next.disabled = !answers.q5;
        next.classList.toggle("opacity-50", next.disabled);
        return;
      }
      MockBackend.saveOnboardingSurvey("mock-user", answers).then(function () {
        window.location.href = "auth-success-done.html";
      });
    });
    setStep(1);
  </script>
</body>
</html>
