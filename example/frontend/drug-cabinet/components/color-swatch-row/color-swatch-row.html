<div class="mt-8">
  <p class="text-xs font-bold uppercase tracking-wider text-stone-500">Label color</p>
  <div class="mt-3 flex flex-wrap gap-3" role="list" aria-label="Color options">
    <button
      type="button"
      class="h-10 w-10 cursor-pointer rounded-full bg-[#e8b4b8] ring-2 ring-transparent ring-offset-2 transition-shadow duration-200 hover:ring-stone-300 focus:outline-none focus-visible:ring-honey"
      aria-label="Pink"
    ></button>
    <button
      type="button"
      class="h-10 w-10 cursor-pointer rounded-full bg-[#f4b45f] ring-2 ring-forest ring-offset-2 transition-shadow duration-200 hover:ring-forest/80 focus:outline-none focus-visible:ring-honey"
      aria-label="Honey"
      aria-current="true"
    ></button>
    <button
      type="button"
      class="h-10 w-10 cursor-pointer rounded-full bg-[#7eb8da] ring-2 ring-transparent ring-offset-2 transition-shadow duration-200 hover:ring-stone-300 focus:outline-none focus-visible:ring-honey"
      aria-label="Sky"
    ></button>
    <button
      type="button"
      class="h-10 w-10 cursor-pointer rounded-full bg-[#9ed9b0] ring-2 ring-transparent ring-offset-2 transition-shadow duration-200 hover:ring-stone-300 focus:outline-none focus-visible:ring-honey"
      aria-label="Mint"
    ></button>
    <button
      type="button"
      class="h-10 w-10 cursor-pointer rounded-full bg-[#c4b5fd] ring-2 ring-transparent ring-offset-2 transition-shadow duration-200 hover:ring-stone-300 focus:outline-none focus-visible:ring-honey"
      aria-label="Lilac"
    ></button>
  </div>
</div>
