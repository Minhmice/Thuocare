<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drug Cabinet — Mockups</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ["Fraunces", "Georgia", "serif"],
            sans: ["Nunito", "system-ui", "sans-serif"],
          },
          colors: {
            forest: "#1a3d36",
            honey: "#f4b45f",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-stone-100 font-sans text-forest antialiased">
  <main class="mx-auto flex min-h-screen max-w-lg flex-col items-center justify-center px-6 py-12">
    <p class="font-display text-2xl font-semibold text-forest">Your Personal Drug Cabinet</p>
    <p class="mt-2 text-center text-sm text-stone-600">Static HTML mockups — Tailwind v3 (CDN)</p>
    <p class="mt-1 max-w-sm text-center text-xs text-amber-800/90">
      Các trang dùng <code class="rounded bg-amber-100 px-1">data-include</code> + <code class="rounded bg-amber-100 px-1">js/includes.js</code>. Chạy local server từ thư mục này, ví dụ:
      <code class="mt-1 block rounded bg-stone-200 px-2 py-1 text-[11px] text-stone-800">npx --yes serve .</code>
    </p>
    <div data-include="components/hub-navigation/hub-navigation.html"></div>
    <p class="mt-8 text-center text-xs text-stone-500">
      Component parts: <code class="rounded bg-stone-200 px-1">components/*/</code> và <code class="rounded bg-stone-200 px-1">COMPONENTS.md</code>.
    </p>
  </main>
  <script src="js/includes.js"></script>
</body>
</html>
