name: Build iOS dev client (EAS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile to use from eas.json"
        required: false
        default: "development"
      create_release:
        description: "If true, create/update a GitHub Release and upload the .ipa asset"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Git tag to create/upload release asset to (e.g., dev-client)"
        required: false
        default: "dev-client"
      release_name:
        description: "GitHub Release name"
        required: false
        default: "iOS dev client"

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-dev-client:
    name: iOS EAS build (dev client)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Ensure jq is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          jq --version

      - name: Run EAS build (wait)
        id: eas_build
        shell: bash
        run: |
          set -euo pipefail

          PROFILE="${{ inputs.profile }}"
          echo "Using EAS profile: $PROFILE"

          eas build --platform ios --profile "$PROFILE" --non-interactive --wait --json | tee eas-build.json

          BUILD_ID="$(jq -r '.[0].id // .id // empty' eas-build.json)"
          if [[ -z "$BUILD_ID" || "$BUILD_ID" == "null" ]]; then
            echo "Failed to parse build id from eas-build.json"
            cat eas-build.json
            exit 1
          fi

          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Download .ipa from EAS
        id: eas_download
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          IPA_PATH="dist/thuocare-dev-client-${{ inputs.profile }}.ipa"

          eas build:download --platform ios --id "${{ steps.eas_build.outputs.build_id }}" --path "$IPA_PATH" --non-interactive

          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          ls -la dist

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dev-client-ipa
          path: ${{ steps.eas_download.outputs.ipa_path }}
          if-no-files-found: error

  release:
    name: Release .ipa asset
    needs: build-dev-client
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release }}
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download .ipa artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-dev-client-ipa
          path: dist

      - name: Create/Update Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          files: dist/*.ipa
          fail_on_unmatched_files: true

